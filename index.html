<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CFA Troyes · Suivi des TP</title>
<meta name="theme-color" content="#0E1417">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Suivi TP CFA">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOKENS — thème "tableau électrique" : graphite + cuivre + LED
   ============================================================ */
:root{
  --bg:            #0E1417;
  --bg-panel:      #161D22;
  --bg-panel-2:    #1C242B;
  --line:          #2A343C;
  --line-soft:     #212A31;
  --text:          #E7EDF1;
  --text-muted:    #8C9BA6;
  --text-dim:      #5C6A74;
  --copper:        #E2913E;
  --copper-soft:   #6B4A25;
  --led-green:     #4ADE80;
  --led-green-dim: #1F3B2A;
  --led-red:       #F0605F;
  --led-red-dim:   #3B2323;
  --teal:          #4FD1C5;
  --font-display:  'Space Grotesk', system-ui, sans-serif;
  --font-body:     'Inter', system-ui, sans-serif;
  --font-mono:     'IBM Plex Mono', ui-monospace, monospace;
  --radius:        10px;
  --radius-sm:     6px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 15% -10%, #16202433 0%, transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:14.5px;
  line-height:1.5;
  min-height:100vh;
}
::selection{ background:var(--copper); color:#1a1a1a; }
::-webkit-scrollbar{ width:10px; height:10px; }
::-webkit-scrollbar-track{ background:var(--bg-panel); }
::-webkit-scrollbar-thumb{ background:var(--line); border-radius:6px; }

a{color:var(--copper);}
h1,h2,h3,h4{font-family:var(--font-display); margin:0; letter-spacing:-0.01em;}
button{font-family:var(--font-body); cursor:pointer;}
input, select, textarea{font-family:var(--font-body); color:var(--text);}

/* ---------- Layout shell ---------- */
html, body{ overflow-x:hidden; } /* garde-fou : jamais de scroll horizontal involontaire */
.app{ display:flex; min-height:100vh; }

.sidebar{
  width:230px; flex-shrink:0;
  background:var(--bg-panel);
  border-right:1px solid var(--line);
  display:flex; flex-direction:column;
  position:fixed; top:0; left:0; height:100vh; z-index:30;
  transform:translateX(-100%); /* état par défaut (mobile) : tiroir fermé */
  transition:transform .2s ease, width .15s ease;
}

.backdrop{
  display:none; position:fixed; inset:0; background:#05080ACC;
  z-index:25;
}

.collapse-btn{
  position:absolute; top:20px; right:-13px;
  width:26px; height:26px; border-radius:50%;
  background:var(--bg-panel-2); border:1px solid var(--line); color:var(--text-muted);
  display:flex; align-items:center; justify-content:center; font-size:12px;
  z-index:2;
}
.collapse-btn:hover{ border-color:var(--copper); color:var(--copper); }

.menu-toggle{
  width:36px; height:36px; border-radius:8px; flex-shrink:0;
  background:none; border:1px solid var(--line); color:var(--text);
  display:flex; align-items:center; justify-content:center; font-size:16px;
}
.menu-toggle:hover{ border-color:var(--copper); color:var(--copper); }
.topbar-led{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }

.brand{
  padding:22px 20px 16px;
  border-bottom:1px solid var(--line);
  position:relative;
}
.brand .mark{
  display:inline-flex; align-items:center; gap:8px;
  font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--text);
  white-space:nowrap;
}
.brand .mark .bolt{ color:var(--copper); font-size:18px; }
.brand .sub{ margin-top:4px; font-size:11.5px; color:var(--text-dim); font-family:var(--font-mono); letter-spacing:.03em; white-space:nowrap; }

.nav{ flex:1; padding:14px 10px; display:flex; flex-direction:column; gap:2px; overflow-y:auto; }
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:var(--radius-sm);
  color:var(--text-muted); font-size:13.5px; font-weight:500;
  border:1px solid transparent; background:none;
  text-align:left; width:100%; white-space:nowrap;
}
.nav-item .num{
  font-family:var(--font-mono); font-size:11px; color:var(--text-dim);
  width:18px; flex-shrink:0;
}
.nav-item:hover{ background:var(--bg-panel-2); color:var(--text); }
.nav-item.active{
  background:linear-gradient(90deg, #6B4A2530, transparent);
  border-left:2px solid var(--copper);
  color:var(--text);
}
.nav-item.active .num{ color:var(--copper); }

.sidebar-foot{
  padding:14px 16px; border-top:1px solid var(--line);
  display:flex; align-items:flex-start; justify-content:space-between; gap:8px;
}
.conn-block{ min-width:0; }
.conn-status{ display:flex; align-items:center; gap:7px; white-space:nowrap; }
.led{ width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }
.led.on{ background:var(--led-green); box-shadow:0 0 6px var(--led-green); }
.led.off{ background:var(--led-red); box-shadow:0 0 6px var(--led-red); }
.status-txt{ font-family:var(--font-mono); font-size:10.5px; color:var(--text-dim); letter-spacing:.03em; white-space:nowrap; }
.sheet-link{
  display:inline-block; margin:5px 0 0 15px;
  font-size:11px; color:var(--copper); text-decoration:none; font-weight:600;
}
.sheet-link:hover{ text-decoration:underline; }
.sheet-link.disabled{ color:var(--text-dim); pointer-events:none; }
.gear-btn{
  background:none; border:1px solid var(--line); color:var(--text-muted);
  width:28px; height:28px; border-radius:7px; font-size:14px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.gear-btn:hover{ border-color:var(--copper); color:var(--copper); }

.main{ flex:1; min-width:0; display:flex; flex-direction:column; transition:margin-left .15s ease; width:100%; }

/* ============================================================
   DESKTOP (>=900px) — sidebar toujours visible, mode "survol"
   Réduite à des icônes par défaut ; s'élargit automatiquement au
   survol de la souris et se rétracte dès qu'elle la quitte, sans
   avoir besoin de cliquer ailleurs. Le bouton "‹/›" permet de
   l'épingler grande ouverte en permanence si préféré.
   ============================================================ */
@media(min-width:900px){
  .sidebar{ transform:translateX(0); width:64px; } /* toujours visible, réduite par défaut */
  .sidebar:not(.pinned):hover{ width:230px; }
  .sidebar.pinned{ width:230px; }

  /* Contenu masqué en mode réduit, réapparaît au survol ou si épinglée */
  .sidebar .brand .sub,
  .sidebar .nav-item span:not(.num),
  .sidebar .conn-block{ display:none; }
  .sidebar:not(.pinned):hover .brand .sub,
  .sidebar.pinned .brand .sub{ display:block; }
  .sidebar:not(.pinned):hover .nav-item span:not(.num),
  .sidebar.pinned .nav-item span:not(.num){ display:inline; }
  .sidebar:not(.pinned):hover .conn-block,
  .sidebar.pinned .conn-block{ display:block; }

  .sidebar .brand{ padding:22px 0 16px; text-align:center; transition:padding .15s; }
  .sidebar:not(.pinned):hover .brand,
  .sidebar.pinned .brand{ padding:22px 20px 16px; text-align:left; }
  .sidebar .brand .mark{ font-size:0; }
  .sidebar:not(.pinned):hover .brand .mark,
  .sidebar.pinned .brand .mark{ font-size:15px; }
  .sidebar .brand .mark .bolt{ font-size:18px; }

  .sidebar .nav-item{ justify-content:center; padding:10px 6px; }
  .sidebar:not(.pinned):hover .nav-item,
  .sidebar.pinned .nav-item{ justify-content:flex-start; padding:10px 12px; }
  .sidebar .nav-item .num{ display:inline; } /* toujours visible en mode réduit : sert d'icône */

  .sidebar .sidebar-foot{ justify-content:center; }
  .sidebar:not(.pinned):hover .sidebar-foot,
  .sidebar.pinned .sidebar-foot{ justify-content:space-between; }

  .main{ margin-left:64px; } /* espace réservé fixe : le survol ne pousse pas le contenu */
  body.sidebar-pinned .main{ margin-left:230px; }

  .menu-toggle{ display:none; } /* inutile : la sidebar est toujours accessible */
  .backdrop{ display:none !important; } /* jamais de fond assombri sur desktop */
}

.topbar{
  height:56px; flex-shrink:0;
  border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:12px;
  padding:0 20px;
  background:#0E1417CC; backdrop-filter:blur(6px);
  position:sticky; top:0; z-index:5;
}
.topbar h1{ font-size:16.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.topbar .crumb{ margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--text-dim); }
.content{ padding:26px 28px 60px; max-width:1320px; width:100%; margin:0 auto; }

/* ---------- primitives ---------- */
.card{
  background:var(--bg-panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:20px;
}
.grid{ display:grid; gap:16px; }
.grid-4{ grid-template-columns:repeat(4,1fr); }
.grid-2{ grid-template-columns:repeat(2,1fr); }
@media(max-width:980px){ .grid-4{grid-template-columns:repeat(2,1fr);} .grid-2{grid-template-columns:1fr;} }
@media(max-width:640px){ .grid-4{grid-template-columns:1fr;} }

.kpi{ display:flex; flex-direction:column; gap:6px; }
.kpi .label{ font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); font-weight:600; }
.kpi .value{ font-family:var(--font-mono); font-size:28px; font-weight:600; color:var(--text); }
.kpi .value .unit{ font-size:14px; color:var(--text-muted); margin-left:3px; }
.kpi .delta{ font-size:12px; color:var(--teal); }

.section-title{
  display:flex; align-items:center; gap:10px;
  margin:34px 0 14px;
}
.section-title h2{ font-size:14px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); font-weight:600; }
.section-title .rule{ flex:1; height:1px; background:var(--line); }

.btn{
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 14px; border-radius:7px; font-size:13px; font-weight:600;
  border:1px solid var(--line); background:var(--bg-panel-2); color:var(--text);
}
.btn:hover{ border-color:var(--text-dim); }
.btn-copper{ background:var(--copper); border-color:var(--copper); color:#1A1206; }
.btn-copper:hover{ background:#eb9d4d; }
.btn-ghost{ background:none; border-color:transparent; color:var(--text-muted); }
.btn-ghost:hover{ color:var(--text); background:var(--bg-panel-2); }
.btn-danger{ background:none; border-color:var(--led-red-dim); color:var(--led-red); }
.btn-danger:hover{ background:var(--led-red-dim); }
.btn-sm{ padding:5px 9px; font-size:11.5px; border-radius:6px; }
.btn:disabled{ opacity:.5; cursor:not-allowed; }

input[type=text], input[type=number], select{
  background:var(--bg); border:1px solid var(--line); border-radius:6px;
  padding:8px 10px; font-size:13px; color:var(--text); width:100%;
}
input:focus, select:focus{ outline:none; border-color:var(--copper); }
label{ font-size:11.5px; color:var(--text-dim); font-weight:600; text-transform:uppercase; letter-spacing:.04em; display:block; margin-bottom:5px; }
.field{ margin-bottom:12px; }

table{ width:100%; border-collapse:collapse; font-size:13px; }
th{
  text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em;
  color:var(--text-dim); font-weight:600; padding:8px 10px; border-bottom:1px solid var(--line);
  white-space:nowrap;
}
td{ padding:8px 10px; border-bottom:1px solid var(--line-soft); vertical-align:middle; }
tr:last-child td{ border-bottom:none; }
tbody tr:hover{ background:var(--bg-panel-2); }
.num-cell{ font-family:var(--font-mono); }

.badge{
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 8px; border-radius:20px; font-size:11px; font-weight:600; font-family:var(--font-mono);
}
.badge.done{ background:var(--led-green-dim); color:var(--led-green); }
.badge.neutral{ background:var(--bg-panel-2); color:var(--text-dim); border:1px solid var(--line); }
.badge.type-conso{ background:#3B2F1A; color:var(--copper); }
.badge.type-reut{ background:#123A38; color:var(--teal); }

.pill-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.pill{
  padding:6px 12px; border-radius:20px; border:1px solid var(--line);
  background:var(--bg-panel-2); font-size:12px; color:var(--text-muted); font-weight:600;
}
.pill.active{ border-color:var(--copper); color:var(--copper); background:#3B2F1A55; }

.section-block{ margin-bottom:22px; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
.section-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 16px; background:var(--bg-panel-2); cursor:pointer;
}
.section-head .left{ display:flex; align-items:center; gap:10px; }
.section-head .code{ font-family:var(--font-mono); color:var(--copper); font-weight:600; font-size:13px; }
.section-head .name{ font-weight:600; font-size:13.5px; }
.section-head .stats{ font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); }
.section-head .chev{ color:var(--text-dim); transition:transform .15s; }
.section-body{ padding:0; }
.section-body.collapsed{ display:none; }

.progress{ height:5px; border-radius:3px; background:var(--line-soft); overflow:hidden; }
.progress > div{ height:100%; background:linear-gradient(90deg, var(--copper), var(--teal)); }

.tp-card{ border:1px solid var(--line); border-radius:var(--radius); margin-bottom:14px; overflow:hidden; }
.tp-card-head{ padding:13px 16px; background:var(--bg-panel-2); display:flex; align-items:center; justify-content:space-between; }
.tp-card-head .title{ display:flex; align-items:baseline; gap:10px; }
.tp-card-head .tpnum{ font-family:var(--font-mono); color:var(--copper); font-weight:700; }
.tp-card-head .total{ font-family:var(--font-mono); color:var(--teal); font-weight:600; }

.modal-overlay{
  position:fixed; inset:0; background:#05080ACC; backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
}
.modal{
  background:var(--bg-panel); border:1px solid var(--line); border-radius:var(--radius);
  width:100%; max-width:520px; max-height:88vh; overflow:auto;
  padding:22px;
}
.modal h3{ font-size:15px; margin-bottom:16px; }
.modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }

.toast-wrap{ position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:8px; z-index:60; }
.toast{
  padding:11px 16px; border-radius:8px; font-size:12.5px; font-weight:600;
  background:var(--bg-panel-2); border:1px solid var(--line); color:var(--text);
  box-shadow:0 8px 24px #00000055; min-width:220px;
  animation:slideIn .18s ease;
}
.toast.ok{ border-color:var(--led-green); color:var(--led-green); }
.toast.err{ border-color:var(--led-red); color:var(--led-red); }
@keyframes slideIn{ from{ transform:translateY(8px); opacity:0;} to{ transform:translateY(0); opacity:1;} }

.empty{ text-align:center; padding:50px 20px; color:var(--text-dim); }
.empty .big{ font-size:32px; margin-bottom:10px; }

.loader{
  width:22px; height:22px; border-radius:50%;
  border:2px solid var(--line); border-top-color:var(--copper);
  animation:spin .7s linear infinite; margin:40px auto;
}
@keyframes spin{ to{ transform:rotate(360deg);} }

.hidden{ display:none !important; }
.text-dim{ color:var(--text-dim); }
.mt0{margin-top:0;}
.flex-between{ display:flex; align-items:center; justify-content:space-between; }
.gap8{ gap:8px; }
.mono{ font-family:var(--font-mono); }

/* ============================================================
   TABLEAUX — défilement horizontal universel
   Chaque tableau de l'appli est enveloppé dans .table-scroll (voir JS).
   C'est ce conteneur, et non le <table> lui-même, qui gère le scroll :
   plus fiable qu'un display:block sur <table> selon les navigateurs.
   Actif à toutes les tailles d'écran (sans effet si le contenu tient
   déjà dans la largeur disponible).
   ============================================================ */
.table-scroll{
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  touch-action: pan-x pan-y; /* autorise explicitement le balayage horizontal tactile */
}
/* Pas de min-width forcée : les petits tableaux (2 colonnes) doivent
   pouvoir passer le texte à la ligne normalement. Les tableaux larges
   (en-têtes en white-space:nowrap) débordent naturellement et deviennent
   défilables grâce au conteneur .table-scroll ci-dessus. */

/* ============================================================
   RESPONSIVE / MOBILE — usage en atelier depuis un téléphone
   La navigation (tiroir rétractable) est gérée plus haut, de façon
   identique quelle que soit l'orientation. Ici on ne touche qu'à la
   densité d'affichage du contenu sur petit écran.
   ============================================================ */
@media (max-width: 899px){
  .sidebar{ width:260px; }
  .collapse-btn{ display:none; } /* pas de mode "réduit/épinglé" sur petit écran, uniquement ouvrir/fermer le tiroir */
  body.nav-open .sidebar{ transform:translateX(0); } /* ouverture du tiroir (fermé par défaut, cf. règle générale) */

  body{ font-size:15px; } /* légèrement plus grand : lisibilité en atelier */
  .topbar{ padding:0 14px; height:52px; }
  .topbar .crumb{ display:none; }
  .topbar h1{ font-size:15px; }
  .content{ padding:16px 14px 30px; }

  .grid-4{ grid-template-columns:1fr 1fr; gap:10px; }
  .card{ padding:14px; }
  .kpi .value{ font-size:22px; }

  /* Cibles tactiles plus grandes pour une utilisation en atelier (gants, doigts mouillés...) */
  .btn{ padding:11px 16px; font-size:14px; }
  .btn-sm{ padding:9px 12px; font-size:13px; }
  select, input[type=text], input[type=number]{ padding:11px 12px; font-size:15px; }
  .gear-btn{ width:36px; height:36px; }

  .modal-overlay{ padding:0; align-items:flex-end; }
  .modal{ max-width:100%; max-height:92vh; border-radius:16px 16px 0 0; }

  .toast-wrap{ left:12px; right:12px; bottom:16px; }
  .toast{ min-width:0; }

  .section-head{ padding:14px; }
  .tp-card-head{ padding:14px; flex-wrap:wrap; gap:6px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- ============================= SIDEBAR ============================= -->
  <aside class="sidebar" id="sidebar">
    <button class="collapse-btn" id="collapseBtn" title="Réduire le menu">‹</button>
    <div class="brand">
      <div class="mark"><span class="bolt">⏚</span> CFA Troyes</div>
      <div class="sub">SUIVI DES TP — ÉLEC</div>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-page="accueil"><span class="num">01</span> <span>Accueil</span></button>
      <button class="nav-item" data-page="suivi"><span class="num">02</span> <span>Suivi global</span></button>
      <button class="nav-item" data-page="nomenclature"><span class="num">03</span> <span>Nomenclature TP</span></button>
      <button class="nav-item" data-page="catalogue"><span class="num">04</span> <span>Catalogue matériel</span></button>
    </nav>
    <div class="sidebar-foot">
      <div class="conn-block">
        <div class="conn-status">
          <span class="led off" id="connLed"></span>
          <span class="status-txt" id="connTxt">Non connecté</span>
        </div>
        <a href="#" target="_blank" rel="noopener" class="sheet-link" id="sheetLink">Ouvrir le classeur ↗</a>
      </div>
      <button class="gear-btn" id="settingsBtn" title="Paramètres de connexion">⚙</button>
    </div>
  </aside>
  <div class="backdrop" id="backdrop"></div>

  <!-- ============================== MAIN =============================== -->
  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle" title="Ouvrir/fermer le menu">☰</button>
      <span class="topbar-led led off" id="topbarLed" title="Statut de connexion"></span>
      <h1 id="pageTitle">Accueil</h1>
      <span class="crumb" id="pageCrumb">SUIVI-TP / ACCUEIL</span>
    </div>
    <div class="content" id="content">
      <div class="loader"></div>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toastWrap"></div>

<!-- ============================ SETTINGS MODAL ============================ -->
<div class="modal-overlay hidden" id="settingsModal">
  <div class="modal">
    <h3>Connexion au Google Sheet</h3>
    <p class="text-dim" style="font-size:12.5px;margin-top:-8px;margin-bottom:16px;">
      Collez ici l'URL de déploiement de votre application Apps Script
      (se termine par <span class="mono">/exec</span>).
    </p>
    <div class="field">
      <label>URL de l'API</label>
      <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/AKfycb.../exec">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="settingsCancel">Annuler</button>
      <button class="btn btn-copper" id="settingsSave">Enregistrer &amp; tester</button>
    </div>
  </div>
</div>

<script>
/* ==========================================================================
   CONFIG
   ========================================================================== */

// Collez ici l'URL de déploiement (se termine par /exec), obtenue à
// l'étape "Déployer > Nouveau déploiement > Application Web".
// Une fois cette valeur renseignée, l'icône ⚙ disparaît de l'interface :
// plus personne n'a besoin (ni ne peut) saisir une URL différente.
const HARD_CODED_API_URL = "https://script.google.com/macros/s/AKfycby9FAjlwtfYxzm9neVXcWhm-qYPgENvJcd6xz6BrgiWhZcpOUBKctB4vLwXcYBZ7AQP/exec";

// Lien direct vers le Google Sheet (bouton "Ouvrir le classeur ↗" en bas de
// la barre latérale). Utile pour une correction ponctuelle directement dans
// le Sheet, ou pour vérifier une formule.
const SHEET_URL = "https://docs.google.com/spreadsheets/d/145sQjhaUKe7ig8Wrx1YXqB19gwe_IyUn41aeCoeZwmg/edit?gid=1175086447#gid=1175086447&fvid=1957555810";

};

/* ==========================================================================
   API CLIENT
   Astuce CORS : les requêtes POST utilisent Content-Type: text/plain pour
   rester des requêtes "simples" (pas de pre-flight OPTIONS), ce que Apps
   Script sait gérer nativement.
   ========================================================================== */
async function apiGet(action){
  if(!state.apiUrl) throw new Error('API non configurée');
  // Anti-cache : les Web Apps Apps Script peuvent voir leurs requêtes GET
  // mises en cache (navigateur ou CDN) si l'URL est identique à chaque
  // appel. Le paramètre horodaté force une URL unique à chaque lecture.
  const url = state.apiUrl + '?action=' + encodeURIComponent(action) + '&_=' + Date.now();
  const res = await fetch(url, { cache:'no-store' });
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'Erreur API');
  return json.data;
}
async function apiPost(action, payload){
  if(!state.apiUrl) throw new Error('API non configurée');
  const res = await fetch(state.apiUrl, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload })
  });
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'Erreur API');
  return json.data;
}

/* ==========================================================================

function toast(msg, type='ok'){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 3800);
}

const settingsModal = document.getElementById('settingsModal');

  settingsModal.classList.remove('hidden');
});

  state.apiUrl = url;

  settingsModal.classList.add('hidden');
  await checkConnection();

async function checkConnection(){
  // Deux jeux d'éléments : le bloc de la barre latérale (desktop) et la
  // barre compacte affichée sous le bandeau supérieur (mobile). Les deux
  // sont toujours tenus à jour ensemble.
  const leds  = [document.getElementById('connLed'), document.getElementById('topbarLed')];
  const txts  = [document.getElementById('connTxt')];
  const links = [document.getElementById('sheetLink')];

  links.forEach(link=>{
    if(SHEET_URL){
      link.href = SHEET_URL;
      link.classList.remove('disabled');
    } else {
      link.classList.add('disabled');
      link.textContent = 'Aucun lien configuré';
    }
  });

  function setStatus(ledState, label){
    leds.forEach(l => { l.classList.remove('on','off'); l.classList.add(ledState); });
    txts.forEach(t => t.textContent = label);
  }

  if(!state.apiUrl){
    setStatus('off', 'Non connecté');
    return false;
  }
  try{
    await apiGet('dashboard');
    setStatus('on', 'Connecté à Google Sheet');
    return true;
  }catch(err){
    setStatus('off', 'Erreur — Google Sheet');
    return false;
  }
}

/* ==========================================================================
   RENDER ROUTER
   ========================================================================== */
async function render(){
  const content = document.getElementById('content');
  if(!state.apiUrl){
    content.innerHTML = `
      <div class="empty">
        <div class="big">⚙</div>
        <h3 style="margin-bottom:8px;">Connexion requise</h3>
        <p class="text-dim">Ouvrez les paramètres (icône engrenage en bas de la barre latérale)<br>
        et collez l'URL de déploiement de votre application Apps Script.</p>
        <button class="btn btn-copper" style="margin-top:16px;" onclick="document.getElementById('settingsBtn').click()">Configurer la connexion</button>
      </div>`;
    return;
  }
  content.innerHTML = '<div class="loader"></div>';
  try{
    if(state.page==='accueil') await renderAccueil();
    else if(state.page==='suivi') await renderSuivi();
    else if(state.page==='nomenclature') await renderNomenclature();
    else if(state.page==='catalogue') await renderCatalogue();
  }catch(err){
    content.innerHTML = `<div class="empty"><div class="big">⚠</div><h3>Impossible de charger les données</h3><p class="text-dim">${escapeHtml(err.message)}</p></div>`;
  }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtEUR(n){
  return (Number(n)||0).toLocaleString('fr-FR', { minimumFractionDigits:2, maximumFractionDigits:2 }) + ' €';
}

/* ==========================================================================
   PAGE 2 — SUIVI GLOBAL
   ========================================================================== */
async function renderSuivi(){
  const d = await apiGet('suiviGlobal');
  state.data.suivi = d;
  const content = document.getElementById('content');

  if(!d.sections.length){
    content.innerHTML = `<div class="empty"><div class="big">📋</div><h3>Aucune session trouvée</h3></div>`;
    return;
  }

  const tpOptionsHtml = ['<option value="">—</option>'].concat(
    d.tpOptions.map(t=>`<option value="${escapeHtml(t.numero)}">${escapeHtml(t.numero)} — ${escapeHtml(t.intitule||'')}</option>`)
  ).join('');

  const totalCout = d.sections.reduce((sum, sec) => sum + sectionCost(sec), 0);
  const totalSeancesAvecTP = d.sections.reduce((sum, sec) => sum + sec.rows.filter(r=>r.tpRealise).length, 0);

  const introHtml = `
    <div class="card" style="margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
      <div>
        <p style="margin:0 0 4px;font-size:13px;color:var(--text-muted);">
          Pour chaque semaine, indiquez le TP consommé en atelier (et l'effectif) : le coût se calcule
          automatiquement. Une ligne sans TP sélectionné signifie simplement qu'aucun TP n'a été réalisé
          cette semaine-là — ce n'est pas une tâche en attente.
        </p>
        <span class="mono text-dim" style="font-size:11.5px;">${totalSeancesAvecTP} séance(s) avec TP consommé au total</span>
      </div>
      <div style="text-align:right;">
        <div class="label" style="margin-bottom:2px;">Coût cumulé en atelier</div>
        <div class="value mono" style="font-size:24px;color:var(--teal);">${fmtEUR(totalCout)}</div>
      </div>
    </div>
  `;

  content.innerHTML = introHtml + d.sections.map((sec, si)=>{
    const done = sec.rows.filter(r=>r.tpRealise).length;
    const rowsHtml = sec.rows.map(r=>`
      <tr data-row="${r.rowNumber}">
        <td class="num-cell text-dim">${r.numero}</td>
        <td class="mono">${escapeHtml(r.semaine||'')}</td>
        <td class="mono text-dim" style="white-space:nowrap;">${escapeHtml(r.dates||'')}</td>
        <td>
          <div style="font-weight:600;">${escapeHtml(r.module||'')}</div>
          <div class="text-dim" style="font-size:12px;">${escapeHtml(r.intitule||'')}</div>
        </td>
        <td class="num-cell">${r.effectifRef ?? ''}</td>
        <td>
          <select class="tp-select" data-row="${r.rowNumber}" style="min-width:170px;">
            ${tpOptionsHtml}
          </select>
        </td>
        <td><input type="number" class="eff-input" data-row="${r.rowNumber}" value="${r.effectifReel ?? ''}" style="width:64px;"></td>
        <td class="num-cell">${r.coutApp ? fmtEUR(r.coutApp) : '—'}</td>
        <td class="num-cell" style="font-weight:600;">${r.coutTotal ? fmtEUR(r.coutTotal) : '—'}</td>
        <td><span class="led-status" data-row="${r.rowNumber}">${badgeFor(r.tpRealise)}</span></td>
      </tr>`).join('');

    return `
      <div class="section-block" data-section-idx="${si}">
        <div class="section-head" onclick="toggleSection(${si})">
          <div class="left">
            <span class="chev" id="chev-${si}">▾</span>
            <span class="code">${escapeHtml(sec.code)}</span>
            <span class="name">${escapeHtml(sec.nom)}</span>
          </div>
          <span class="stats">${done} / ${sec.rows.length} séances avec TP · ${fmtEUR(sectionCost(sec))}</span>
        </div>
        <div class="section-body" id="body-${si}">
          <div class="table-scroll"><table>
            <thead>
              <tr>
                <th>N°</th><th>Sem.</th><th>Dates</th><th>Module</th><th>Eff. réf.</th>
                <th>TP réalisé</th><th>Eff. réel</th><th>Coût/app.</th><th>Coût total</th><th></th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table></div>
        </div>
      </div>`;
  }).join('');

  // set current select values
  d.sections.forEach(sec=> sec.rows.forEach(r=>{
    const sel = content.querySelector(`select.tp-select[data-row="${r.rowNumber}"]`);
    if(sel) sel.value = r.tpRealise || '';
  }));

  // bind events
  content.querySelectorAll('.tp-select').forEach(sel=>{
    sel.addEventListener('change', ()=> saveSession(sel.dataset.row));
  });
  content.querySelectorAll('.eff-input').forEach(inp=>{
    inp.addEventListener('change', ()=> saveSession(inp.dataset.row));
  });
}

function sectionCost(sec){
  return sec.rows.reduce((sum, r) => sum + (Number(r.coutTotal) || 0), 0);
}

function badgeFor(tpRealise){
  return tpRealise
    ? `<span class="badge done">✓ TP consommé</span>`
    : `<span class="badge neutral">— Aucun TP</span>`;
}

function toggleSection(idx){
  const body = document.getElementById('body-'+idx);
  const chev = document.getElementById('chev-'+idx);
  body.classList.toggle('collapsed');
  chev.style.transform = body.classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(0deg)';
}

async function saveSession(rowNumber){
  const sel = document.querySelector(`select.tp-select[data-row="${rowNumber}"]`);
  const inp = document.querySelector(`.eff-input[data-row="${rowNumber}"]`);
  const tr = document.querySelector(`tr[data-row="${rowNumber}"]`);
  try{
    tr.style.opacity = '.5';
    const updated = await apiPost('updateSession', {
      rowNumber: rowNumber,
      tpRealise: sel.value,
      effectifReel: inp.value
    });
    tr.querySelectorAll('td')[7].textContent = updated.coutApp ? fmtEUR(updated.coutApp) : '—';
    tr.querySelectorAll('td')[8].textContent = updated.coutTotal ? fmtEUR(updated.coutTotal) : '—';
    tr.querySelector('.led-status').innerHTML = badgeFor(updated.tpRealise);
    tr.style.opacity = '1';
    toast('Session mise à jour', 'ok');
  }catch(err){
    tr.style.opacity = '1';
    toast('Erreur : ' + err.message, 'err');
  }
}

    await apiPost('deleteNomenclatureComponent', { rowNumber });
    toast('Composant supprimé', 'ok');

  const catalogue = state.data.catalogueCache;
  openModal(`
    <h3>Ajouter un composant — TP ${escapeHtml(tpNumero)}</h3>
    <div class="field">
      <label>Désignation (doit exister dans le catalogue)</label>

  try{
    const cat = state.data.catalogueCache || await apiGet('catalogue');

    const dl = document.getElementById('catalogueList');
    if(dl) dl.innerHTML = cat.items.map(i=>`<option value="${escapeHtml(i.designation)}">`).join('');

  const rowsHtml = newTPComponents.map((c,i)=>`
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;">
      <input type="text" list="catalogueList2" placeholder="Désignation" value="${escapeHtml(c.designation)}"
        oninput="newTPComponents[${i}].designation=this.value" style="flex:2;">
      <input type="number" step="0.01" placeholder="Qté" value="${c.quantite}"
        oninput="newTPComponents[${i}].quantite=this.value" style="width:70px;">
      <button class="btn btn-sm btn-danger" onclick="removeNewTPRow(${i})">✕</button>
    </div>`).join('');

  openModal(`
    <h3>Créer un nouveau TP</h3>
    <div class="field">
      <label>Numéro de TP</label>
      <input type="text" id="mNumero" placeholder="Ex : TP 10" value="${escapeHtml(newTPHeader.numero)}" oninput="newTPHeader.numero=this.value">
    </div>
    <div class="field">
      <label>Intitulé du TP</label>
      <input type="text" id="mIntitule" placeholder="Ex : Maquette domotique" value="${escapeHtml(newTPHeader.intitule)}" oninput="newTPHeader.intitule=this.value">
    </div>
    <div class="field">
      <label>Type de TP</label>
      <select id="mTypeTP" oninput="newTPHeader.typeTP=this.value">${tpTypeOptionsHtml(newTPHeader.typeTP)}</select>
      <p class="text-dim" style="font-size:11.5px;margin:5px 0 0;">
        Sert à calculer automatiquement le coût amorti des composants réutilisables de ce TP (nombre de TP/an selon son type).
      </p>
    </div>
    <div class="field">
      <label>Composants</label>
      <datalist id="catalogueList2"></datalist>
      <div id="newTPRows">${rowsHtml}</div>
      <button class="btn btn-sm btn-ghost" onclick="addNewTPRow()">+ Ajouter une ligne</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-copper" id="mSubmitTP">Créer le TP</button>
    </div>
  `);
  document.getElementById('mSubmitTP').addEventListener('click', submitCreateTP);
  setTimeout(()=>{
    const cat = state.data.catalogueCache;
    if(cat){ document.getElementById('catalogueList2').innerHTML = cat.items.map(i=>`<option value="${escapeHtml(i.designation)}">`).join(''); }
  }, 100);
}

// Liste fixe des 4 types de TP (correspond à CONFIG.TP_TYPES côté Apps Script)
const TP_TYPE_OPTIONS = [
  { key:'batiment',    label:'Bâtiment' },
  { key:'indus',       label:'Indus simple' },
  { key:'automatisme', label:'Automatisme' },
  { key:'variateur',   label:'Variateur' }
];
function tpTypeOptionsHtml(selected){
  return ['<option value="">— Non défini —</option>']
    .concat(TP_TYPE_OPTIONS.map(t=>`<option value="${t.key}" ${t.key===selected?'selected':''}>${escapeHtml(t.label)}</option>`))
    .join('');
}
function tpTypeLabelToKey_(label){
  const found = TP_TYPE_OPTIONS.find(t=>t.label===label);
  return found ? found.key : '';
}

// Chaque ajout/suppression de ligne reconstruit la fenêtre : on capture
// d'abord les valeurs actuellement saisies dans newTPHeader (au cas où
// l'événement "input" n'aurait pas encore eu le temps de se déclencher),
// pour ne jamais perdre le numéro / intitulé déjà renseignés.
function captureHeaderFields(){
  const nEl = document.getElementById('mNumero');
  const iEl = document.getElementById('mIntitule');
  const tEl = document.getElementById('mTypeTP');
  if(nEl) newTPHeader.numero = nEl.value;
  if(iEl) newTPHeader.intitule = iEl.value;
  if(tEl) newTPHeader.typeTP = tEl.value;
}
function addNewTPRow(){ captureHeaderFields(); newTPComponents.push({designation:'',quantite:1}); renderCreateTPModal(); }
function removeNewTPRow(i){ captureHeaderFields(); newTPComponents.splice(i,1); if(!newTPComponents.length) newTPComponents.push({designation:'',quantite:1}); renderCreateTPModal(); }

async function submitCreateTP(){
  captureHeaderFields();
  const numero = newTPHeader.numero.trim();
  const intitule = newTPHeader.intitule.trim();
  const typeTP = newTPHeader.typeTP;
  const composants = newTPComponents.filter(c=>c.designation && c.quantite);
  if(!numero || !intitule){ toast('Numéro et intitulé requis', 'err'); return; }
  if(!composants.length){ toast('Au moins un composant requis', 'err'); return; }
  try{
    await apiPost('createNewTP', { numero, intitule, typeTP, composants });
    closeModal();
    toast('Nouveau TP créé', 'ok');
    await renderNomenclature();
  }catch(err){ toast('Erreur : '+err.message, 'err'); }
}

/* ---------- Modifier / supprimer un TP complet ---------- */
function openEditTPHeader(oldNumero, oldIntitule, currentTypeKey){
  openModal(`
    <h3>Modifier le TP ${escapeHtml(oldNumero)}</h3>
    <p class="text-dim" style="font-size:12.5px;margin-top:-8px;margin-bottom:16px;">
      Si vous changez le numéro, toutes les sessions du Suivi Global déjà
      assignées à ce TP seront automatiquement mises à jour vers le nouveau
      numéro (aucune session ne sera perdue).
    </p>
    <div class="field">
      <label>Numéro de TP</label>
      <input type="text" id="mEditNumero" value="${escapeHtml(oldNumero)}">
    </div>
    <div class="field">
      <label>Intitulé du TP</label>
      <input type="text" id="mEditIntitule" value="${escapeHtml(oldIntitule)}">
    </div>
    <div class="field">
      <label>Type de TP</label>
      <select id="mEditTypeTP">${tpTypeOptionsHtml(currentTypeKey||'')}</select>
      <p class="text-dim" style="font-size:11.5px;margin:5px 0 0;">
        Changer le type recalcule automatiquement l'amortissement des
        composants réutilisables de ce TP.
      </p>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-copper" id="mSubmitEditTP">Enregistrer</button>
    </div>
  `);
  document.getElementById('mSubmitEditTP').addEventListener('click', async ()=>{
    const numero = document.getElementById('mEditNumero').value.trim();
    const intitule = document.getElementById('mEditIntitule').value.trim();
    const typeTP = document.getElementById('mEditTypeTP').value;
    if(!numero || !intitule){ toast('Numéro et intitulé requis', 'err'); return; }
    try{
      await apiPost('updateTPHeader', { oldNumero, numero, intitule, typeTP });
      closeModal();
      toast('TP mis à jour', 'ok');
      await renderNomenclature();
    }catch(err){ toast('Erreur : '+err.message, 'err'); }
  });
}

async function confirmDeleteTP(numero, intitule){
  const ok = confirm(
    `Supprimer entièrement le TP ${numero} (${intitule || 'sans intitulé'}) ?\n\n` +
    `Tous ses composants seront supprimés de la nomenclature. Les sessions du ` +
    `Suivi Global qui lui étaient assignées repasseront à "Aucun TP" (leur ` +
    `historique de dates/effectifs est conservé, seul le TP sélectionné est retiré).\n\n` +
    `Cette action est irréversible.`
  );
  if(!ok) return;
  try{
    await apiPost('deleteTP', { numero });
    toast('TP supprimé', 'ok');
    await renderNomenclature();
  }catch(err){ toast('Erreur : '+err.message, 'err'); }
}

/* ==========================================================================
   PAGE 4 — CATALOGUE DE MATÉRIEL
   ========================================================================== */
async function renderCatalogue(){
  const d = await apiGet('catalogue');
  state.data.catalogueCache = d;
  const content = document.getElementById('content');

  const categories = ['Toutes'].concat([...new Set(d.items.map(i=>i.categorie).filter(Boolean))]);
  state.data._catFilter = state.data._catFilter || 'Toutes';

  content.innerHTML = `
    <div class="card" style="margin-bottom:16px;">
      <div class="flex-between" style="margin-bottom:4px;">
        <h4 style="margin:0;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Paramètres annuels</h4>
        <span class="text-dim" style="font-size:11px;">Calculé automatiquement depuis le Suivi Global</span>
      </div>
      <p class="text-dim" style="font-size:11.5px;margin:0 0 12px;">
        Pour chaque catégorie, le nombre de TP/an correspond au nombre de fois où un TP de ce type
        a été sélectionné comme "TP réalisé" dans le Suivi Global (toutes sections confondues).
      </p>
      <div class="table-scroll"><table>
        <thead><tr><th>Type de TP</th><th>Nb TP / an</th><th>TP concernés</th></tr></thead>
        <tbody>
          ${d.params.map(p=>`
            <tr>
              <td>${escapeHtml(p.label)}</td>
              <td class="num-cell" style="font-weight:600;color:var(--teal);">${escapeHtml(String(p.valeur))}</td>
              <td class="text-dim" style="font-size:12.5px;">${p.tpConcernes ? escapeHtml(p.tpConcernes) : '—'}</td>
            </tr>`).join('')}
        </tbody>
      </table></div>
    </div>
    <div class="card" style="margin-bottom:26px;">
      <h4 style="margin-bottom:12px;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Légende des catégories</h4>
      <div class="table-scroll"><table>
        <tbody>
          ${d.legende.map(l=>`<tr><td class="mono" style="color:var(--copper);">${escapeHtml(l.code)}</td><td>${escapeHtml(l.categorie)}</td></tr>`).join('')}
        </tbody>
      </table></div>
    </div>

    <div class="flex-between" style="margin-bottom:14px;">
      <div class="pill-row" id="catFilters" style="margin-bottom:0;">
        ${categories.map(c=>`<button class="pill ${c===state.data._catFilter?'active':''}" data-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('')}
      </div>
      <button class="btn btn-copper" onclick="openAddCatalogueItem()">+ Nouvel article</button>
    </div>

    <div class="card" style="padding:0;">
      <div class="table-scroll"><table>
        <thead>
          <tr>
            <th>Désignation</th><th>Catégorie</th><th>Unité</th><th>Référence</th>
            <th>Prix réduit</th><th>Prix complet</th><th>Durée de vie</th><th>Type de TP</th><th>Prix / TP</th><th></th>
          </tr>
        </thead>
        <tbody id="catalogueBody"></tbody>
      </table></div>
    </div>
  `;

  renderCatalogueRows(d.items);

  content.querySelectorAll('#catFilters .pill').forEach(p=>{
    p.addEventListener('click', ()=>{
      state.data._catFilter = p.dataset.cat;
      content.querySelectorAll('#catFilters .pill').forEach(x=>x.classList.toggle('active', x===p));
      const filtered = p.dataset.cat==='Toutes' ? d.items : d.items.filter(i=>i.categorie===p.dataset.cat);
      renderCatalogueRows(filtered);
    });
  });
}

function renderCatalogueRows(items){
  const body = document.getElementById('catalogueBody');
  if(!items.length){
    body.innerHTML = `<tr><td colspan="10" class="text-dim" style="padding:20px;text-align:center;">Aucun article</td></tr>`;
    return;
  }
  const typeLabels = {}; (state.data.catalogueCache.tpTypes||[]).forEach(t=> typeLabels[t.key]=t.label);
  body.innerHTML = items.map(i=>{
    const isReutilisable = typeof i.dureeVie === 'number';
    const typesBadges = (i.tpTypes||[]).map(k=>`<span class="badge type-reut" style="margin-right:3px;">${escapeHtml(typeLabels[k]||k)}</span>`).join('');
    const typeTpCell = isReutilisable
      ? (i.tpTypes && i.tpTypes.length
          ? `${typesBadges}${i.nbTotalTP ? `<div class="text-dim" style="font-size:11px;margin-top:3px;">${escapeHtml(String(i.nbTotalTP))} TP au total</div>` : ''}`
          : `<span class="text-dim" style="font-size:12px;">⚠ aucun type de TP défini</span>`)
      : `<span class="text-dim">—</span>`;
    return `
    <tr>
      <td style="font-weight:500;">${escapeHtml(i.designation)}</td>
      <td class="mono text-dim">${escapeHtml(i.categorie||'')}</td>
      <td>${escapeHtml(i.unite||'')}</td>
      <td class="mono text-dim">${escapeHtml(i.reference||'')}</td>
      <td class="num-cell">${i.prixReduit ? fmtEUR(i.prixReduit) : '—'}</td>
      <td class="num-cell">${i.prixComplet ? fmtEUR(i.prixComplet) : '—'}</td>
      <td class="num-cell">${escapeHtml(String(i.dureeVie||''))}</td>
      <td style="min-width:150px;">${typeTpCell}</td>
      <td class="num-cell" style="font-weight:600;">${i.prixParTP ? fmtEUR(i.prixParTP) : '—'}</td>
      <td style="white-space:nowrap;">
        <button class="btn btn-sm btn-ghost" onclick="openEditCatalogueItem(${i.rowNumber})">Modifier</button>
        <button class="btn btn-sm btn-danger" onclick="deleteCatalogueItem(${i.rowNumber})">Suppr.</button>
      </td>
    </tr>`;
  }).join('');
}

function openAddCatalogueItem(){
  openModal(`
    <h3>Nouvel article catalogue</h3>
    ${catalogueFormFields()}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-copper" id="mSubmitCat">Ajouter</button>
    </div>
  `);
  bindCatalogueFormEvents();
  document.getElementById('mSubmitCat').addEventListener('click', async ()=>{
    const payload = readCatalogueForm();
    if(!payload.designation){ toast('Désignation requise', 'err'); return; }
    try{
      await apiPost('addCatalogueItem', payload);
      closeModal();
      toast('Article ajouté', 'ok');
      await renderCatalogue();
    }catch(err){ toast('Erreur : '+err.message, 'err'); }
  });
}

function openEditCatalogueItem(rowNumber){
  const item = state.data.catalogueCache.items.find(i=>i.rowNumber===rowNumber);
  if(!item) return;
  openModal(`
    <h3>Modifier — ${escapeHtml(item.designation)}</h3>
    ${catalogueFormFields(item)}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-copper" id="mSubmitCat">Enregistrer</button>
    </div>
  `);
  bindCatalogueFormEvents();
  document.getElementById('mSubmitCat').addEventListener('click', async ()=>{
    const payload = readCatalogueForm();
    payload.rowNumber = rowNumber;
    try{
      await apiPost('updateCatalogueItem', payload);
      closeModal();
      toast('Article mis à jour', 'ok');
      await renderCatalogue();
    }catch(err){ toast('Erreur : '+err.message, 'err'); }
  });
}

async function deleteCatalogueItem(rowNumber){
  if(!confirm('Supprimer cet article du catalogue ?')) return;
  try{
    await apiPost('deleteCatalogueItem', { rowNumber });
    toast('Article supprimé', 'ok');
    await renderCatalogue();
  }catch(err){ toast('Erreur : '+err.message, 'err'); }
}

function catalogueFormFields(item={}){
  const isReutilisable = typeof item.dureeVie === 'number';
  const typeLabels = {}; (state.data.catalogueCache ? state.data.catalogueCache.tpTypes : []).forEach(t=> typeLabels[t.key]=t.label);
  const currentTypesHtml = (item.tpTypes||[]).length
    ? (item.tpTypes||[]).map(k=>`<span class="badge type-reut" style="margin-right:4px;">${escapeHtml(typeLabels[k]||k)}</span>`).join('')
    : `<span class="text-dim" style="font-size:12.5px;">Aucun pour l'instant — associez ce composant à un TP depuis la page Nomenclature.</span>`;

  return `
    <div class="field"><label>Désignation</label><input type="text" id="fDesignation" value="${escapeHtml(item.designation||'')}"></div>
    <div class="grid grid-2">
      <div class="field"><label>Catégorie (code)</label><input type="text" id="fCategorie" value="${escapeHtml(item.categorie||'')}" placeholder="Ex : C03"></div>
      <div class="field"><label>Unité</label><input type="text" id="fUnite" value="${escapeHtml(item.unite||'U')}"></div>
    </div>
    <div class="field"><label>Référence fournisseur</label><input type="text" id="fReference" value="${escapeHtml(item.reference||'')}"></div>
    <div class="grid grid-2">
      <div class="field"><label>Prix unitaire réduit (€)</label><input type="number" step="0.01" id="fPrixReduit" value="${item.prixReduit||''}"></div>
      <div class="field"><label>Prix unitaire complet (€)</label><input type="number" step="0.01" id="fPrixComplet" value="${item.prixComplet||''}"></div>
    </div>
    <div class="field">
      <label>Durée de vie (années) — laisser vide si consommable</label>
      <input type="number" step="1" id="fDureeVie" value="${isReutilisable ? item.dureeVie : ''}" placeholder="Ex : 7 — vide = consommable, non amorti">
    </div>
    <div class="field" id="tpTypesBlock" style="${isReutilisable ? '' : 'display:none;'} background:var(--bg-panel-2);border:1px solid var(--line);border-radius:8px;padding:12px 14px;">
      <label style="margin-bottom:9px;">Type(s) de TP utilisant ce matériel</label>
      <p class="text-dim" style="font-size:11.5px;margin:0 0 9px;">
        Calculé automatiquement à partir des TP qui utilisent ce composant
        (page Nomenclature TP → type de chaque TP). Rien à cocher ici.
      </p>
      ${currentTypesHtml}
    </div>
  `;
}

function bindCatalogueFormEvents(){
  const dureeInput = document.getElementById('fDureeVie');
  const block = document.getElementById('tpTypesBlock');
  if(!dureeInput || !block) return;
  dureeInput.addEventListener('input', ()=>{
    block.style.display = dureeInput.value.trim() ? '' : 'none';
  });
}

function readCatalogueForm(){
  return {
    designation: document.getElementById('fDesignation').value.trim(),
    categorie: document.getElementById('fCategorie').value.trim(),
    unite: document.getElementById('fUnite').value.trim(),
    reference: document.getElementById('fReference').value.trim(),
    prixReduit: document.getElementById('fPrixReduit').value,
    prixComplet: document.getElementById('fPrixComplet').value,
    dureeVie: document.getElementById('fDureeVie').value.trim()
    // tpTypes n'est plus envoyé : calculé côté serveur à partir de l'usage réel.
  };
}


/* ==========================================================================
   MODAL HELPERS
   ========================================================================== */
function openModal(innerHtml){
  let overlay = document.getElementById('genericModal');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.id = 'genericModal';
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal" id="genericModalInner"></div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
  }
  document.getElementById('genericModalInner').innerHTML = innerHtml;
  overlay.classList.remove('hidden');
}
function closeModal(){
  const overlay = document.getElementById('genericModal');
  if(overlay) overlay.classList.add('hidden');
}

/* ==========================================================================
   BOOT
   ========================================================================== */
(async function boot(){
  // Si l'URL de l'API est codée en dur (HARD_CODED_API_URL), on masque
  // l'icône ⚙ : personne n'a besoin (ni ne doit) la modifier à la main.
  // Ça évite qu'un membre de l'équipe pointe involontairement vers une
  // autre copie du Sheet / une mauvaise URL.
  if(HARD_CODED_API_URL){
    document.getElementById('settingsBtn').style.display = 'none';
  }
  await checkConnection();
  render();
})();
</script>
